services:
  - type: web
    name: ezekiel-the-prophet
    runtime: node
    plan: free
    branch: master
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_MCC_ID
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
